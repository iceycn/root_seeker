# Qdrant 服务配置（项目内 data 目录，相对启动时 cwd 为项目根）
log_level: INFO

storage:
  storage_path: ./data/qdrant_storage
  snapshots_path: ./data/qdrant_storage/snapshots
  on_disk_payload: true
  wal:
    wal_capacity_mb: 32
    wal_segments_ahead: 0

service:
  host: 0.0.0.0
  http_port: 6333
  grpc_port: 6334
  enable_cors: true

cluster:
  enabled: false

telemetry_disabled: true
