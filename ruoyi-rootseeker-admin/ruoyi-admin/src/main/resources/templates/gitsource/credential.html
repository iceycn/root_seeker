<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org">
<head>
	<th:block th:include="include :: header('Git 凭证配置')" />
</head>
<body class="white-bg">
    <div class="wrapper wrapper-content animated fadeInRight ibox-content">
        <form class="form-horizontal m" id="form-credential">
            <div class="form-group">
                <label class="col-sm-3 control-label is-required">平台域名：</label>
                <div class="col-sm-8">
                    <input id="domain" name="domain" class="form-control" type="text" required 
                        th:value="${credential.domain}" placeholder="Gitee: https://gitee.com；Codeup: https://openapi-rdc.aliyuncs.com"/>
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label is-required">账号：</label>
                <div class="col-sm-8">
                    <input id="username" name="username" class="form-control" type="text" required th:value="${credential.username}" placeholder="Codeup 填组织 ID"/>
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label is-required">密码/Token：</label>
                <div class="col-sm-8">
                    <input id="password" name="password" class="form-control" type="password" required th:value="${credential.password}" placeholder="留空表示不修改"/>
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label">平台：</label>
                <div class="col-sm-8">
                    <select id="platform" name="platform" class="form-control">
                        <option value="generic" th:selected="${credential.platform == 'generic'}">自动检测</option>
                        <option value="gitee" th:selected="${credential.platform == 'gitee'}">Gitee</option>
                        <option value="github" th:selected="${credential.platform == 'github'}">GitHub</option>
                        <option value="gitlab" th:selected="${credential.platform == 'gitlab'}">GitLab</option>
                        <option value="codeup" th:selected="${credential.platform == 'codeup'}">Codeup</option>
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label"></label>
                <div class="col-sm-8">
                    <span class="help-block">Codeup：域名填 <code>https://openapi-rdc.aliyuncs.com</code>，账号填组织 ID，密码填个人访问令牌（PAT）</span>
                </div>
            </div>
            <div class="form-group">
                <div class="col-sm-offset-3 col-sm-8">
                    <button type="button" class="btn btn-primary" onclick="saveCredential()">保存凭证</button>
                    <button type="button" class="btn btn-info" onclick="verifyCredentials()">验证凭证</button>
                    <button type="button" class="btn btn-success" onclick="fetchRepos()">保存并拉取仓库列表</button>
                </div>
            </div>
        </form>
    </div>
    <th:block th:include="include :: footer" />
    <script type="text/javascript">
        var prefix = ctx + "gitsource";
        function saveCredential() {
            if (!$("#domain").val() || !$("#username").val() || !$("#password").val()) {
                $.modal.alertError("请填写域名、账号和密码");
                return;
            }
            $.ajax({
                url: prefix + "/credential/save",
                type: "post",
                data: $("#form-credential").serialize(),
                dataType: "json",
                success: function(result) {
                    if (result.code == web_status.SUCCESS) {
                        $.modal.msgSuccess("保存成功");
                    } else {
                        $.modal.alertError(result.msg);
                    }
                }
            });
        }
        function verifyCredentials() {
            if (!$("#domain").val() || !$("#username").val() || !$("#password").val()) {
                $.modal.alertError("请填写域名、账号和密码");
                return;
            }
            $.modal.loading("正在验证凭证...");
            $.ajax({
                url: prefix + "/verify",
                type: "post",
                data: {
                    domain: $("#domain").val(),
                    username: $("#username").val(),
                    password: $("#password").val(),
                    platform: $("#platform").val()
                },
                dataType: "json",
                success: function(result) {
                    $.modal.closeLoading();
                    if (result.code == web_status.SUCCESS) {
                        $.modal.msgSuccess(result.msg || "凭证有效");
                    } else {
                        $.modal.alertError(result.msg || "验证失败");
                    }
                },
                error: function(xhr) {
                    $.modal.closeLoading();
                    $.modal.alertError("验证失败，请确保 RootSeeker 服务已启动（默认 http://localhost:8000）");
                }
            });
        }
        function fetchRepos() {
            if (!$("#domain").val() || !$("#username").val() || !$("#password").val()) {
                $.modal.alertError("请填写域名、账号和密码");
                return;
            }
            $.modal.loading("正在拉取仓库列表...");
            $.ajax({
                url: prefix + "/fetch",
                type: "post",
                data: {
                    domain: $("#domain").val(),
                    username: $("#username").val(),
                    password: $("#password").val(),
                    platform: $("#platform").val()
                },
                dataType: "json",
                success: function(result) {
                    $.modal.closeLoading();
                    if (result.code == web_status.SUCCESS) {
                        $.modal.msgSuccess("拉取成功，共 " + (result.data && result.data.total ? result.data.total : 0) + " 个仓库");
                        $.modal.close();
                        if (parent.$.table) parent.$.table.refresh();
                    } else {
                        $.modal.alertError(result.msg);
                    }
                },
                error: function() {
                    $.modal.closeLoading();
                    $.modal.alertError("拉取失败，请确保 RootSeeker 服务已启动且 api_key 已配置");
                }
            });
        }
    </script>
</body>
</html>
