<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org">
<head>
	<th:block th:include="include :: header('RootSeeker 配置')" />
</head>
<body class="white-bg">
    <div class="wrapper wrapper-content animated fadeInRight ibox-content">
        <form class="form-horizontal m" id="form-config">
            <div class="form-group">
                <label class="col-sm-3 control-label is-required">RootSeeker 服务地址：</label>
                <div class="col-sm-8">
                    <input id="baseUrl" name="baseUrl" class="form-control" type="text" required
                        th:value="${baseUrl}" placeholder="http://localhost:8000"/>
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label"></label>
                <div class="col-sm-8">
                    <span class="help-block">分析工具 RootSeeker 的 HTTP 地址，用于拉取仓库列表、同步、配置仓库等。默认 <code>http://localhost:8000</code></span>
                </div>
            </div>
            <div class="form-group">
                <div class="col-sm-offset-3 col-sm-8">
                    <button type="button" class="btn btn-primary" onclick="saveConfig()">保存配置</button>
                </div>
            </div>
        </form>
    </div>
    <th:block th:include="include :: footer" />
    <script type="text/javascript">
        var prefix = ctx + "gitsource";
        function saveConfig() {
            var url = $("#baseUrl").val();
            if (!url || !url.trim()) {
                $.modal.alertError("请填写 RootSeeker 服务地址");
                return;
            }
            $.ajax({
                url: prefix + "/config/save",
                type: "post",
                data: { baseUrl: url.trim() },
                dataType: "json",
                success: function(result) {
                    if (result.code == web_status.SUCCESS) {
                        $.modal.msgSuccess("保存成功");
                    } else {
                        $.modal.alertError(result.msg);
                    }
                }
            });
        }
    </script>
</body>
</html>
