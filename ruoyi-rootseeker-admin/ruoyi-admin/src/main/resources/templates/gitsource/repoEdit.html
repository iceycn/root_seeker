<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org">
<head>
	<th:block th:include="include :: header('编辑仓库')" />
</head>
<body class="white-bg">
    <div class="wrapper wrapper-content animated fadeInRight ibox-content">
        <form class="form-horizontal m" id="form-repo-edit">
            <input type="hidden" name="id" th:value="${repo.id}"/>
            <input type="hidden" name="fullName" th:value="${repo.fullName}"/>
            <input type="hidden" name="gitUrl" th:value="${repo.gitUrl}"/>
            <input type="hidden" name="defaultBranch" th:value="${repo.defaultBranch}"/>
            <div class="form-group">
                <label class="col-sm-3 control-label">仓库名：</label>
                <div class="col-sm-8">
                    <input class="form-control" type="text" th:value="${repo.fullName}" disabled/>
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label">分支（逗号分隔）：</label>
                <div class="col-sm-8">
                    <input id="branches" name="branches" class="form-control" type="text" 
                        th:value="${repo.defaultBranch}" 
                        placeholder="如 main,master，多个用逗号分隔"/>
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label">启用：</label>
                <div class="col-sm-8">
                    <div class="radio-box">
                        <input type="radio" id="enabled1" name="enabled" value="true" th:checked="${repo.enabled == 1}"/>
                        <label for="enabled1">是</label>
                    </div>
                    <div class="radio-box">
                        <input type="radio" id="enabled0" name="enabled" value="false" th:checked="${repo.enabled == 0}"/>
                        <label for="enabled0">否</label>
                    </div>
                </div>
            </div>
        </form>
    </div>
    <th:block th:include="include :: footer" />
    <script type="text/javascript">
        var prefix = ctx + "gitsource";
        function submitHandler(index, layero) {
            var branches = $("#branches").val();
            var enabled = $("input[name='enabled']:checked").val() === 'true';
            $.ajax({
                url: prefix + "/repo/edit",
                type: "post",
                data: {
                    id: $("input[name='id']").val(),
                    fullName: $("input[name='fullName']").val(),
                    gitUrl: $("input[name='gitUrl']").val(),
                    defaultBranch: $("input[name='defaultBranch']").val(),
                    branches: branches,
                    enabled: enabled
                },
                dataType: "json",
                success: function(result) {
                    if (result.code == web_status.SUCCESS) {
                        $.modal.msgSuccess(result.msg);
                        if (typeof index !== 'undefined' && typeof top.layer !== 'undefined') {
                            top.layer.close(index);
                        } else {
                            $.modal.close();
                        }
                        if (parent && parent.$.table) parent.$.table.refresh();
                    } else {
                        $.modal.alertError(result.msg);
                    }
                }
            });
        }
    </script>
</body>
</html>
