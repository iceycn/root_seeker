# RootSeeker Docker 编排（Qdrant + RootSeeker，无 Zoekt/Admin）
# 用法: cd root_seeker_docker && docker compose up -d
# 停止: docker compose down

services:
  qdrant:
    image: qdrant/qdrant:v1.16.3
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334

  root-seeker:
    build:
      context: ..
      dockerfile: root_seeker_docker/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ../config.yaml:/app/config.yaml:ro
      - ../data:/app/data
    environment:
      - ROOT_SEEKER_CONFIG_PATH=/app/config.yaml
    depends_on:
      - qdrant
    # config.yaml 中 qdrant.url 需为 http://qdrant:6333（见 config.docker.yaml）

volumes:
  qdrant_storage:
