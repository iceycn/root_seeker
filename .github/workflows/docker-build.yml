# RootSeeker Docker 镜像自动构建与推送
# 同时推送至 ghcr.io 与 Docker Hub
# Docker Hub 需在仓库 Settings → Secrets 配置 DOCKERHUB_USERNAME、DOCKERHUB_TOKEN

name: Build and Push Docker Image

on:
  push:
    branches:
      - main
      - master
      - feature/3.0.0
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - master

jobs:
  build-root-seeker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ github.repository_owner }}/root-seeker
            ${{ secrets.DOCKERHUB_USERNAME }}/root-seeker
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' }}
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=

      - name: Build and push RootSeeker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: root_seeker_docker/Dockerfile.lsp
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
